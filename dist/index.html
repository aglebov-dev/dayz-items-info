<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DayZ Config Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- LEFT: details of the selected class -->
    <main class="details" id="details">
      <div class="empty" id="emptyState">
        <h1>DayZ Config Explorer</h1>
        <p>Выберите класс в списке слева, чтобы увидеть его свойства (включая
           наследуемые), слоты и предметы, которые в них подходят.</p>
        <div class="status" id="appStatus"></div>
      </div>

      <article class="card" id="detailCard" hidden>
        <header class="detail-head">
          <div class="titles">
            <h1 id="dName" class="mono"></h1>
            <div id="dDisplay" class="display"></div>
            <div id="dDesc" class="desc"></div>
          </div>
          <div class="meta">
            <span class="chip" id="dScope"></span>
            <span class="src mono" id="dSource"></span>
          </div>
        </header>

        <section class="block" id="inheritBlock">
          <h2>Наследование</h2>
          <div class="chain" id="dInherit"></div>
        </section>

        <section class="block">
          <h2>Свойства <span class="count" id="propCount"></span></h2>
          <div class="table-wrap">
            <table class="props">
              <thead>
                <tr><th>Свойство</th><th>Значение</th><th>Источник</th></tr>
              </thead>
              <tbody id="dProps"></tbody>
            </table>
          </div>
        </section>

        <section class="block" id="slotsBlock">
          <h2>Слоты и совместимые предметы
            <span class="count" id="slotCount"></span>
            <label class="toggle"><input type="checkbox" id="rawSlotsToggle" /> показать все слоты</label>
          </h2>
          <div id="dSlots" class="slots"></div>
        </section>
      </article>
    </main>

    <!-- RIGHT: searchable class list -->
    <aside class="sidebar">
      <div class="search">
        <input type="search" id="searchInput" placeholder="Поиск по имени или названию…" autocomplete="off" />
        <select id="scopeSelect" title="Область">
          <option value="">Все области</option>
        </select>
        <label class="opt"><input type="checkbox" id="searchDescToggle" /> искать также в описании</label>
      </div>
      <div class="list-info" id="listInfo"></div>
      <ul class="class-list" id="classList"></ul>
    </aside>
  </div>

  <script src="datasource.js"></script>
  <script src="app.js"></script>
</body>
</html>
